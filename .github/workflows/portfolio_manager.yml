name: Portfolio Manager

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  run-portfolio-manager:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test API
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
           python test_api.py

      - name: Run portfolio manager
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YAHOO_COOKIE: ${{ secrets.YAHOO_COOKIE }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          python main.py

      - name: Commit state file
        run: |
          git config --global user.name "portfolio-bot"
          git config --global user.email "portfolio-bot@github-actions"
          git pull --rebase origin main
          git add portfolio_state.json
          git diff --staged --quiet || git commit -m "chore: update portfolio_state [skip ci]"
          git push
