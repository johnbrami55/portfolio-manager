"""
main.py — Orchestrator: runs the full pipeline on each GitHub Actions trigger.

Pipeline:
  1. Load state
  2. Detect market regime (+ check for regime change)
  3. Poll Telegram for user commands
  4. Get liquid universe
  5. Compute betas
  6. Score universe
  7. Update score history
  8. Evaluate sell signals on open positions
  9. Build portfolio / generate buy signals
 10. Send alerts (sells first, then buys)
 11. Save state
 12. Weekly summary (Mondays)
"""

import logging
import sys
from datetime import datetime

import config
from regime   import detect_regime
from universe import get_liquid_universe
from scorer   import score_universe
from portfolio import build_portfolio
from signals  import evaluate_sells, generate_buy_signals, check_regime_change_sells
from state    import load_state, save_state, update_score_history
from utils    import compute_betas, portfolio_beta
from telegram_bot import (
    send_message, send_buy_alert, send_sell_alert,
    send_regime_change_alert, send_weekly_summary,
    poll_and_handle_commands,
)

# ── Logging setup ──────────────────────────────────────────────────────────────
logging.basicConfig(level=config.LOG_LEVEL, format=config.LOG_FORMAT)
logger = logging.getLogger(__name__)


def is_monday() -> bool:
    return datetime.utcnow().weekday() == 0  # 0 = Monday


def is_rebalance_week(state: dict) -> bool:
    """
    Returns True every 2 weeks based on ISO week number.
    Rebalances on even ISO weeks (biweekly).
    """
    week = datetime.utcnow().isocalendar().week
    return week % 2 == 0


def run():
    logger.info("=" * 60)
    logger.info("Portfolio Manager — starting run")
    logger.info(f"Timestamp: {datetime.utcnow().isoformat()}")
    logger.info("=" * 60)

    # ── 1. Load state ──────────────────────────────────────────────────────────
    state = load_state()
    prev_regime = state.get("current_regime", "NEUTRAL")

    # ── 2. Detect regime ───────────────────────────────────────────────────────
    regime_info = detect_regime()
    regime      = regime_info["regime"]
    cac_data    = regime_info["cac40"]
    state["current_regime"] = regime

    logger.info(f"Regime: {regime} (prev: {prev_regime})")

    # ── 3. Poll Telegram commands ──────────────────────────────────────────────
    logger.info("Polling Telegram for commands...")
    try:
        poll_and_handle_commands()
    except Exception as e:
        logger.warning(f"Telegram poll failed (non-fatal): {e}")

    # ── 4. Regime change detection ─────────────────────────────────────────────
    regime_changed = regime != prev_regime
    if regime_changed:
        logger.info(f"⚠ REGIME CHANGE: {prev_regime} → {regime}")
        positions = state.get("positions", {})

        # Identify positions to sell due to regime change
        regime_sells = check_regime_change_sells(positions, prev_regime, regime)
        tickers_to_sell = [s["ticker"] for s in regime_sells]

        try:
            send_regime_change_alert(prev_regime, regime, cac_data, tickers_to_sell)
        except Exception as e:
            logger.error(f"Regime change alert failed: {e}")

        # Send individual sell alerts
        for sig in regime_sells:
            try:
                send_sell_alert(sig)
            except Exception as e:
                logger.error(f"Sell alert failed for {sig['ticker']}: {e}")

    # ── 5. Universe + liquidity filter ────────────────────────────────────────
    liquid = get_liquid_universe(regime)
    tickers = [item["ticker"] for item in liquid]
    logger.info(f"Liquid universe: {len(tickers)} tickers")

    if not tickers:
        logger.error("Empty universe — aborting")
        save_state(state)
        sys.exit(1)

    # ── 6. Compute betas ───────────────────────────────────────────────────────
    betas = compute_betas(tickers)

    # ── 7. Score universe ──────────────────────────────────────────────────────
    scored = score_universe(liquid, regime, betas)
    logger.info(f"Scored {len(scored)} tickers")

    # ── 8. Update score history ────────────────────────────────────────────────
    update_score_history(state, scored)

    # ── 9. Evaluate sell signals ───────────────────────────────────────────────
    sell_signals = evaluate_sells(state, regime, state.get("score_history", {}))
    logger.info(f"Sell signals: {len(sell_signals)}")

    # ── 10. Build portfolio / buy signals ──────────────────────────────────────
    # Rebalance check
    do_rebalance = is_monday() and is_rebalance_week(state)

    # Attach last_close to scored items for portfolio builder
    liquid_map = {item["ticker"]: item.get("metrics", {}) for item in liquid}
    for s in scored:
        s["last_close"] = liquid_map.get(s["ticker"], {}).get("last_close")
        s["beta"]       = betas.get(s["ticker"], 1.0)

    portfolio_result = build_portfolio(scored, state, regime, betas)
    buy_signals      = generate_buy_signals(
        portfolio_result, state.get("positions", {}), regime
    )

    logger.info(f"Buy signals: {len(buy_signals)}")

    # ── 11. Send alerts ────────────────────────────────────────────────────────
    for sig in sell_signals:
        try:
            send_sell_alert(sig)
        except Exception as e:
            logger.error(f"Sell alert send error for {sig['ticker']}: {e}")

    for sig in buy_signals:
        try:
            # Store pending signal in state for /bought confirmation
            state.setdefault("pending_signals", {})[sig["ticker"]] = {
                "model_price": sig["model_price"],
                "stop_loss":   sig["stop_loss"],
                "take_profit": sig["take_profit"],
                "weight":      sig["weight"],
                "beta":        sig["beta"],
            }
            send_buy_alert(sig, state, regime)
        except Exception as e:
            logger.error(f"Buy alert send error for {sig['ticker']}: {e}")

    # ── 12. Weekly summary (Mondays) ───────────────────────────────────────────
    if is_monday():
        try:
            # Compute CAC40 weekly return
            import yfinance as yf
            cac_hist     = yf.download(config.CAC40_TICKER, period="10d", progress=False, auto_adjust=True)
            cac_week_ret = float(cac_hist["Close"].pct_change(5).iloc[-1]) if len(cac_hist) >= 6 else 0.0
            send_weekly_summary(state, regime, cac_week_ret)
        except Exception as e:
            logger.error(f"Weekly summary failed: {e}")

    # ── 13. Save state ─────────────────────────────────────────────────────────
    pb = portfolio_beta(state.get("positions", {}))
    logger.info(f"Portfolio beta: {pb:.2f} | Positions: {len(state.get('positions', {}))}")
    save_state(state)

    logger.info("Run complete.")


if __name__ == "__main__":
    run()

"""
portfolio.py — Portfolio construction and optimization.
Applies regime-aware weighting, sector/beta constraints, and cost gating.
"""

import logging
import numpy as np
from config import (
    INITIAL_CAPITAL, MIN_POSITION_EUR, MAX_POSITION_PCT, MAX_SECTOR_PCT,
    REGIME_PARAMS, SECTOR_MAP, DEGIRO_FIXED_FEE, DEGIRO_VARIABLE_FEE,
    MAX_ROUNDTRIP_FEE_PCT,
)
from utils import calculate_fee, sector_of

logger = logging.getLogger(__name__)


def compute_weights(scored: list[dict], regime: str) -> list[dict]:
    """
    Compute normalized portfolio weights from scored tickers.
    Applies regime-specific weighting logic.
    Returns list of dicts with ticker, score, beta, raw_weight, weight.
    """
    params = REGIME_PARAMS[regime]
    threshold = params["score_threshold"]
    max_lines = params["max_lines"]
    cash_min  = params["cash_pct_min"]

    # 1. Filter by score threshold
    eligible = [s for s in scored if s["score"] >= threshold]

    if not eligible:
        logger.warning(f"No stocks pass score threshold {threshold} in {regime} regime")
        return []

    # 2. Filter by beta constraint
    max_beta = params["max_beta_per_stock"]
    eligible = [s for s in eligible if s["beta"] <= max_beta]

    if not eligible:
        logger.warning(f"No stocks pass beta filter ({max_beta}) in {regime} regime")
        return []

    # 3. Take top N candidates (generous pool for sector diversification)
    candidates = eligible[:max_lines * 2]

    # 4. Compute raw weights
    for c in candidates:
        beta = max(c["beta"], 0.1)  # avoid division by zero
        if regime == "BULL":
            # Reward higher beta in bull
            c["raw_weight"] = c["score"] * beta * 0.5
        else:
            # Reward score per unit of risk
            c["raw_weight"] = c["score"] / beta

    # 5. Sector diversification: greedy selection respecting MAX_SECTOR_PCT
    selected  = []
    sector_wt = {}

    for c in sorted(candidates, key=lambda x: x["raw_weight"], reverse=True):
        if len(selected) >= max_lines:
            break
        sector = sector_of(c["ticker"])
        current_sector_wt = sector_wt.get(sector, 0.0)
        # Provisional weight (will be normalized later)
        # Check if adding this stock would violate sector cap
        # Approximate: assume equal weight for selection pass
        approx_wt = 1.0 / max(len(selected) + 1, 1)
        approx_sector = current_sector_wt + approx_wt
        if approx_sector > MAX_SECTOR_PCT + 0.05:  # small tolerance
            logger.debug(f"Skipping {c['ticker']} — sector {sector} capped")
            continue
        selected.append(c)
        sector_wt[sector] = current_sector_wt + approx_wt

    if not selected:
        return []

    # 6. Normalize weights
    total_raw = sum(s["raw_weight"] for s in selected)
    for s in selected:
        s["weight"] = s["raw_weight"] / total_raw if total_raw > 0 else 1.0 / len(selected)

    # 7. Clip to MAX_POSITION_PCT and renormalize (iterate up to 10x)
    for _ in range(10):
        clipped = False
        for s in selected:
            if s["weight"] > MAX_POSITION_PCT:
                s["weight"] = MAX_POSITION_PCT
                clipped     = True
        if clipped:
            total_wt = sum(s["weight"] for s in selected)
            for s in selected:
                s["weight"] = s["weight"] / total_wt

    # 8. Cash allocation: if regime requires cash, reduce all weights proportionally
    investable_pct = 1.0 - cash_min
    for s in selected:
        s["weight"] = s["weight"] * investable_pct

    logger.info(f"Portfolio: {len(selected)} positions, cash={cash_min:.0%}")
    return selected


def apply_cost_gate(
    proposed: list[dict],
    current_positions: dict,
    capital: float,
    regime: str,
) -> tuple[list[dict], list[str]]:
    """
    Remove trades where round-trip DEGIRO fee exceeds MAX_ROUNDTRIP_FEE_PCT.
    Also removes positions already held (no change).
    Returns (approved_trades, skipped_log).
    """
    approved = []
    skipped  = []

    for p in proposed:
        ticker   = p["ticker"]
        pos_eur  = p["weight"] * capital
        fee      = calculate_fee(pos_eur)
        rt_fee   = fee * 2  # buy + sell round-trip
        rt_pct   = rt_fee / pos_eur if pos_eur > 0 else 1.0

        if pos_eur < MIN_POSITION_EUR:
            msg = f"{ticker}: position {pos_eur:.0f} EUR < min {MIN_POSITION_EUR} EUR — skipped"
            logger.info(msg); skipped.append(msg)
            continue

        if rt_pct > MAX_ROUNDTRIP_FEE_PCT:
            msg = (
                f"{ticker}: round-trip fee {rt_pct:.2%} > {MAX_ROUNDTRIP_FEE_PCT:.2%} "
                f"(pos={pos_eur:.0f} EUR) — skipped"
            )
            logger.info(msg); skipped.append(msg)
            continue

        approved.append(p)

    return approved, skipped


def build_portfolio(
    scored: list[dict],
    current_state: dict,
    regime: str,
    betas: dict,
) -> dict:
    """
    Full portfolio construction pipeline.
    Returns dict: {proposed_buys, skipped_trades, weights, cash_eur}.
    """
    current_positions = current_state.get("positions", {})
    cash_eur          = current_state.get("cash_eur", INITIAL_CAPITAL)
    capital           = sum(
        p.get("nb_shares", 0) * p.get("entry_price", 0)
        for p in current_positions.values()
    ) + cash_eur

    if capital <= 0:
        capital = INITIAL_CAPITAL

    weighted = compute_weights(scored, regime)
    if not weighted:
        return {"proposed_buys": [], "skipped_trades": [], "weights": [], "cash_eur": cash_eur}

    approved, skipped = apply_cost_gate(weighted, current_positions, capital, regime)

    # Compute share counts and EUR amounts
    for p in approved:
        p["position_eur"] = round(p["weight"] * capital, 2)
        price = p.get("last_close") or 100.0  # fallback
        p["nb_shares"]    = max(1, int(p["position_eur"] / price))

    # Identify new buys (not already held)
    proposed_buys = [p for p in approved if p["ticker"] not in current_positions]

    params  = REGIME_PARAMS[regime]
    cash_wt = params["cash_pct_min"]
    cash_kept = round(capital * cash_wt, 2)

    return {
        "proposed_buys":  proposed_buys,
        "full_portfolio":  approved,
        "skipped_trades": skipped,
        "weights":        weighted,
        "cash_eur":       cash_kept,
        "capital":        capital,
    }

name: Portfolio Manager

on:
  schedule:
    # Mon-Fri at 08:00 CET (= 07:00 UTC, accounting for CET=UTC+1)
    - cron: "0 7 * * 1-5"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-portfolio-manager:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit portfolio_state.json back

    steps:
      # 1. Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the portfolio manager
      - name: Run portfolio manager
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd portfolio_manager
          python main.py

      # 5. Commit and push portfolio_state.json if changed
      - name: Commit state file
        run: |
          git config --global user.name  "portfolio-bot"
          git config --global user.email "portfolio-bot@github-actions"
          git add portfolio_manager/portfolio_state.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update portfolio_state [skip ci]"
          git push

{
  "current_regime": "NEUTRAL",
  "last_run": null,
  "positions": {},
  "score_history": {},
  "pending_signals": {},
  "performance": {
    "total_pnl_eur": 0.0,
    "total_pnl_pct": 0.0,
    "weekly_returns": [],
    "vs_cac40": []
  },
  "initial_capital": 1890,
  "cash_eur": 1890
}

# 📈 Autonomous Stock Portfolio Manager

A fully automated portfolio management system for CAC40 + AEX stocks, running on GitHub Actions with Telegram alerts. No VPS required.

**Target:** 15% net annual return | **Capital:** €1,890 | **Universe:** CAC40 + AEX (60+ stocks)

---

## 🗂 Architecture

```
main.py           ← Orchestrator (runs daily via GitHub Actions)
config.py         ← All constants and parameters (single source of truth)
regime.py         ← Market regime detection (BULL / NEUTRAL / BEAR)
universe.py       ← Stock universe + liquidity filter
scorer.py         ← 0-100 scoring model (50 pts technical + 50 pts fundamental)
portfolio.py      ← Portfolio construction and weight optimization
signals.py        ← Buy/sell/trailing stop signal generation
state.py          ← portfolio_state.json persistence
utils.py          ← Beta calculation, fee calculator, sector mapping
telegram_bot.py   ← Alerts + bidirectional command handler
```

---

## 🚀 Setup Guide (Step by Step)

### Step 1 — Fork / Create the GitHub Repository

1. Go to [github.com](https://github.com) and sign in
2. Click **New repository** → name it `portfolio-manager` (or any name)
3. Upload all files from this project, preserving the folder structure:
   ```
   portfolio_manager/
   ├── main.py
   ├── config.py
   ├── regime.py
   ├── universe.py
   ├── scorer.py
   ├── portfolio.py
   ├── signals.py
   ├── state.py
   ├── utils.py
   ├── telegram_bot.py
   ├── requirements.txt
   ├── portfolio_state.json
   └── .github/
       └── workflows/
           └── portfolio_manager.yml
   ```

### Step 2 — Create Your Telegram Bot

1. Open Telegram and search for **@BotFather**
2. Send `/newbot` and follow the prompts:
   - Choose a name (e.g. `My Portfolio Bot`)
   - Choose a username (must end in `bot`, e.g. `myportfolio_bot`)
3. BotFather will reply with your **Bot Token** — looks like:
   ```
   1234567890:ABCDEFghijklmnopqrstuvwxyz1234567890
   ```
   Save this token.

### Step 3 — Get Your Telegram Chat ID

1. Start a conversation with your new bot (search for its username in Telegram)
2. Send any message (e.g. `/start`)
3. Open this URL in your browser (replace `YOUR_TOKEN`):
   ```
   https://api.telegram.org/botYOUR_TOKEN/getUpdates
   ```
4. Find `"chat":{"id":XXXXXXXX}` in the response — that number is your **Chat ID**

### Step 4 — Add Secrets to GitHub

1. In your GitHub repo: **Settings → Secrets and variables → Actions**
2. Click **New repository secret** for each:

   | Secret Name | Value |
   |---|---|
   | `TELEGRAM_BOT_TOKEN` | Your bot token from Step 2 |
   | `TELEGRAM_CHAT_ID` | Your chat ID from Step 3 |

### Step 5 — First Manual Run to Validate Setup

1. Go to **Actions** tab in your GitHub repo
2. Click **Portfolio Manager** in the left sidebar
3. Click **Run workflow** → **Run workflow**
4. Watch the logs — you should see:
   - Regime detection running
   - Universe scan (60+ tickers)
   - Scoring computation
   - Telegram message delivered to your bot
5. Check your Telegram — you should receive a weekly summary or buy signals

### Step 6 — Automatic Schedule

After setup, the system runs automatically:
- **Mon–Fri at 08:00 CET**: Full pipeline (regime → score → signals → alerts)
- **Every Monday**: Also sends weekly portfolio summary
- **Biweekly Mondays**: Rebalancing check

The `portfolio_state.json` is automatically committed back to the repo after each run.

