name: Backtest
on:
  workflow_dispatch:
concurrency:
  group: backtest
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy openpyxl requests
      - name: Run backtest
        run: python backtest.py
      - name: Commit results
        run: |
          git config --global user.name "portfolio-bot"
          git config --global user.email "portfolio-bot@github-actions"
          git add backtest_results.xlsx backtest_trades.json
          git diff --staged --quiet || git commit -m "backtest: results [skip ci]"
          git push
